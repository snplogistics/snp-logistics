<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bggrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b63d6" />
      <stop offset="100%" stop-color="#072a5b" />
    </linearGradient>
    <filter id="grain"><feTurbulence baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="t"/><feColorMatrix type="saturate" values="0" in="t" result="g"/><feBlend in="SourceGraphic" in2="g" mode="overlay"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bggrad)" />

  <!-- subtle shapes to match testimonials style -->
  <g opacity="0.12" fill="#ffffff">
    <circle cx="260" cy="120" r="240"/>
    <circle cx="1400" cy="760" r="300"/>
  </g>

  <!-- stylized truck silhouette on the right -->
  <g transform="translate(700,230) scale(1.3)" fill="#0f1720" opacity="0.08">
    <rect x="220" y="120" width="540" height="180" rx="18"/>
    <rect x="40" y="180" width="200" height="120" rx="14"/>
    <circle cx="160" cy="330" r="48"/>
    <circle cx="640" cy="330" r="48"/>
    <rect x="760" y="160" width="40" height="120" rx="8"/>
    <rect x="220" y="90" width="540" height="30" rx="6"/>
  </g>

  <g opacity="0.04" filter="url(#grain)"></g>
</svg>
